<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AdGen AI</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f172a">

<style>
body {
    margin: 0;
    font-family: -apple-system;
    background: #0f172a;
    color: white;
}

header {
    padding: 20px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
}

.container {
    padding: 15px;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 20px;
    margin-bottom: 15px;
}

input, select, button {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    margin-top: 10px;
}

button {
    background: linear-gradient(90deg,#3b82f6,#06b6d4);
    color: white;
    font-weight: bold;
    font-size: 16px;
}

.preview {
    width: 100%;
    border-radius: 15px;
    margin-top: 10px;
}

canvas {
    width: 100%;
    border-radius: 15px;
    margin-top: 10px;
    background: black;
}
</style>
</head>

<body>

<header>AdGen AI 🚀</header>

<div class="container">

<div class="card">
<label>📸 Imagen</label>
<input type="file" id="imageInput">
<img id="preview" class="preview">
</div>

<div class="card">
<label>🎵 Audio</label>
<input type="file" id="audioInput">
<audio id="audio" controls></audio>
</div>

<div class="card">
<label>⏱ Duración</label>
<select id="duration">
<option value="5">5s</option>
<option value="10">10s</option>
<option value="15">15s</option>
<option value="20">20s</option>
<option value="30">30s</option>
</select>

<label>🔥 Modo</label>
<select id="mode">
<option value="normal">Normal</option>
<option value="viral">Viral</option>
</select>
</div>

<button onclick="generar()">🚀 Generar Video</button>

<canvas id="canvas" width="300" height="500"></canvas>

</div>

<script>
let img = new Image();
let audio = document.getElementById("audio");

document.getElementById("imageInput").onchange = e => {
    let file = e.target.files[0];
    if (file) {
        img.src = URL.createObjectURL(file);
        document.getElementById("preview").src = img.src;
    }
};

document.getElementById("audioInput").onchange = e => {
    let file = e.target.files[0];
    if (file) {
        audio.src = URL.createObjectURL(file);
    }
};

// 🔥 IA REAL
async function generarTextoIA() {
    try {
        const res = await fetch("https://api.openai.com/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": "Bearer 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",
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: "gpt-4o-mini",
                messages: [
                    { role: "user", content: "crea un texto publicitario corto, llamativo y viral en español" }
                ]
            })
        });

        const data = await res.json();
        return data.choices[0].message.content;
    } catch (error) {
        return "🔥 Oferta increíble";
    }
}

function generar() {
    let canvas = document.getElementById("canvas");
    let ctx = canvas.getContext("2d");

    let duration = document.getElementById("duration").value;
    let mode = document.getElementById("mode").value;

    if (!img.src) {
        alert("Subí una imagen primero");
        return;
    }

    audio.currentTime = 0;
    audio.play();

    let start = null;

    generarTextoIA().then(texto => {

        function anim(t) {
            if (!start) start = t;
            let p = (t - start) / 1000;

            ctx.clearRect(0,0,300,500);

            let scale = 1 + p * (mode === "viral" ? 0.1 : 0.05);

            ctx.drawImage(img, -50*scale, -50*scale, 400*scale, 600*scale);

            ctx.fillStyle = "white";
            ctx.font = mode === "viral" ? "bold 26px Arial" : "22px Arial";
            ctx.fillText(texto, 20, 450);

            if (p < duration) requestAnimationFrame(anim);
            else audio.pause();
        }

        requestAnimationFrame(anim);

    });
}
</script>

</body>
</html>
