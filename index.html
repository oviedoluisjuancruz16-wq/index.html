<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdGen AI PRO</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont;
    background: #0f172a;
    color: white;
    margin: 0;
}

header {
    padding: 15px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    background: #020617;
}

.container {
    padding: 15px;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 15px;
}

label {
    font-weight: bold;
}

input, select, button {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    margin-top: 8px;
}

button {
    background: linear-gradient(90deg,#3b82f6,#06b6d4);
    color: white;
    font-weight: bold;
}

.preview {
    width: 100%;
    border-radius: 15px;
    margin-top: 10px;
}

canvas {
    width: 100%;
    border-radius: 15px;
    margin-top: 10px;
    background: black;
}

.progress {
    height: 8px;
    background: #334155;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 10px;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #22c55e;
}

</style>
</head>

<body>

<header>AdGen AI PRO 🚀</header>

<div class="container">

    <!-- IMAGEN -->
    <div class="card">
        <label>📸 Imagen</label>
        <input type="file" id="imageInput" accept="image/*">
        <img id="previewImg" class="preview" />
    </div>

    <!-- AUDIO -->
    <div class="card">
        <label>🎵 Audio (MP3)</label>
        <input type="file" id="audioInput" accept="audio/*">
        <audio id="audioPlayer" controls></audio>
    </div>

    <!-- CONFIG -->
    <div class="card">
        <label>⏱ Duración</label>
        <select id="duration">
            <option value="5">5s</option>
            <option value="10">10s</option>
            <option value="15">15s</option>
            <option value="20">20s</option>
            <option value="30">30s</option>
        </select>

        <label>🎨 Filtro</label>
        <select id="filter">
            <option value="none">Normal</option>
            <option value="grayscale(1)">Blanco y negro</option>
            <option value="sepia(1)">Vintage</option>
            <option value="contrast(1.5)">Contraste</option>
            <option value="saturate(2)">Saturado</option>
        </select>

        <label>🔥 Modo</label>
        <select id="mode">
            <option value="normal">Normal</option>
            <option value="viral">Viral</option>
        </select>
    </div>

    <!-- BOTÓN -->
    <div class="card">
        <button onclick="generateAd()">🚀 Generar Video</button>
        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <!-- CANVAS -->
    <canvas id="canvas" width="300" height="500"></canvas>

    <div class="card">
        <button onclick="download()">⬇ Descargar</button>
    </div>

</div>

<script>
let img = new Image();
let audio = document.getElementById("audioPlayer");
let ctx = document.getElementById("canvas").getContext("2d");

document.getElementById("imageInput").onchange = e => {
    const file = e.target.files[0];
    if (file) {
        img.src = URL.createObjectURL(file);
        document.getElementById("previewImg").src = img.src;
    }
};

document.getElementById("audioInput").onchange = e => {
    const file = e.target.files[0];
    if (file) {
        audio.src = URL.createObjectURL(file);
    }
};

function generateText(mode) {
    if (mode === "viral") {
        const hooks = [
            "😱 NO VAS A CREER ESTO",
            "🔥 ESTO ES UNA LOCURA",
            "🚀 MIRÁ ESTO YA",
        ];
        return hooks[Math.floor(Math.random() * hooks.length)];
    } else {
        const normal = [
            "✨ Probalo hoy",
            "💥 Oferta disponible",
            "🔥 No te lo pierdas",
        ];
        return normal[Math.floor(Math.random() * normal.length)];
    }
}

function generateAd() {
    let duration = document.getElementById("duration").value;
    let filter = document.getElementById("filter").value;
    let mode = document.getElementById("mode").value;

    if (!img.src) {
        alert("Subí una imagen primero");
        return;
    }

    audio.currentTime = 0;
    audio.play();

    let start = null;

    function animate(timestamp) {
        if (!start) start = timestamp;
        let progress = (timestamp - start) / 1000;
        let percent = (progress / duration) * 100;

        document.getElementById("progressBar").style.width = percent + "%";

        ctx.clearRect(0, 0, 300, 500);
        ctx.filter = filter;

        let scale = 1 + progress * (mode === "viral" ? 0.1 : 0.05);

        ctx.drawImage(img, -50 * scale, -50 * scale, 400 * scale, 600 * scale);

        ctx.filter = "none";

        // Texto animado
        ctx.fillStyle = "white";
        ctx.font = mode === "viral" ? "bold 24px Arial" : "20px Arial";
        ctx.fillText(generateText(mode), 20, 450);

        if (progress < duration) {
            requestAnimationFrame(animate);
        } else {
            audio.pause();
            document.getElementById("progressBar").style.width = "100%";
        }
    }

    requestAnimationFrame(animate);
}

function download() {
    let link = document.createElement('a');
    link.download = 'ad.png';
    link.href = document.getElementById('canvas').toDataURL();
    link.click();
}
</script>

</body>
</html>
