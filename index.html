<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AdGen AI</title>

<!-- MODO APP (sin barra safari) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f172a">

<style>
body {
    margin: 0;
    font-family: -apple-system;
    background: #0f172a;
    color: white;
}

header {
    padding: 20px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
}

.container {
    padding: 15px;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 20px;
    margin-bottom: 15px;
}

input, select, button {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    margin-top: 10px;
}

button {
    background: linear-gradient(90deg,#3b82f6,#06b6d4);
    color: white;
    font-weight: bold;
    font-size: 16px;
}

.preview {
    width: 100%;
    border-radius: 15px;
    margin-top: 10px;
}

canvas {
    width: 100%;
    border-radius: 15px;
    margin-top: 10px;
    background: black;
}

</style>
</head>

<body>

<header>AdGen AI 🚀</header>

<div class="container">

<div class="card">
<label>📸 Imagen</label>
<input type="file" id="imageInput">
<img id="preview" class="preview">
</div>

<div class="card">
<label>🎵 Audio</label>
<input type="file" id="audioInput">
<audio id="audio" controls></audio>
</div>

<div class="card">
<label>⏱ Duración</label>
<select id="duration">
<option value="5">5s</option>
<option value="10">10s</option>
<option value="15">15s</option>
<option value="20">20s</option>
<option value="30">30s</option>
</select>

<label>🔥 Modo</label>
<select id="mode">
<option value="normal">Normal</option>
<option value="viral">Viral</option>
</select>
</div>

<button onclick="generar()">🚀 Generar</button>

<canvas id="canvas" width="300" height="500"></canvas>

</div>

<script>
let img = new Image();
let audio = document.getElementById("audio");

document.getElementById("imageInput").onchange = e => {
    let file = e.target.files[0];
    img.src = URL.createObjectURL(file);
    document.getElementById("preview").src = img.src;
};

document.getElementById("audioInput").onchange = e => {
    let file = e.target.files[0];
    audio.src = URL.createObjectURL(file);
};

function generarTextoIAFake() {
    const textos = [
        "🔥 No te lo pierdas",
        "🚀 Oferta única",
        "💥 Esto es increíble",
        "✨ Probalo hoy"
    ];
    return textos[Math.floor(Math.random() * textos.length)];
}

function generar() {
    let canvas = document.getElementById("canvas");
    let ctx = canvas.getContext("2d");

    let duration = document.getElementById("duration").value;
    let mode = document.getElementById("mode").value;

    audio.play();

    let start = null;

    function anim(t) {
        if (!start) start = t;
        let p = (t - start) / 1000;

        ctx.clearRect(0,0,300,500);

        let scale = 1 + p * (mode === "viral" ? 0.1 : 0.05);

        ctx.drawImage(img, -50*scale, -50*scale, 400*scale, 600*scale);

        ctx.fillStyle = "white";
        ctx.font = "22px Arial";
        ctx.fillText(generarTextoIAFake(), 20, 450);

        if (p < duration) requestAnimationFrame(anim);
        else audio.pause();
    }

    requestAnimationFrame(anim);
}
</script>

</body>
</html>
